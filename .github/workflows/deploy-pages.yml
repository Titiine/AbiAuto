name: Déploiement du site (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Envoi du site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
